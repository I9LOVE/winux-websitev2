<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="login-page-body">
    <main class="login-page">
      <section class="login-card">
        <h1>Log in to Winux</h1>
        <p class="login-subtitle">Access your account to manage downloads and updates.</p>

        <form class="login-form">
          <label for="email">Email</label>
          <input id="email" type="email" name="email" placeholder="you@example.com" required />

          <label for="password">Password</label>
          <div class="password-wrap">
            <input
              id="password"
              type="password"
              name="password"
              placeholder="Enter your password"
              required
              minlength="8"
              pattern="(?=.*[!@#$%^&*(),.?':{}|&lt;&gt;]).{8,}"
              title="Use at least 8 characters and at least one symbol."
            />
            <button type="button" class="password-toggle" aria-label="Show password">Show</button>
          </div>
          <p class="password-rules">Password needs 8+ characters and one symbol.</p>

          <div class="login-meta">
            <label class="remember-wrap" for="remember">
              <input id="remember" type="checkbox" name="remember" />
              Remember me
            </label>
            <a href="#">Forgot password?</a>
          </div>

          <button type="submit" class="download-btn">Log in</button>
        </form>

        <p class="login-footer">
          Need an account? <a href="./signup.html">Create one</a>
        </p>
      </section>
    </main>
    <footer class="site-footer">
      <p>&copy; 2026 Winux. All rights reserved.</p>
    </footer>
    <script src="./main.js"></script>
  </body>
</html>
